<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-base-200">

    <!-- NAVBAR -->
    <div class="navbar bg-white shadow px-10 md:justify-between">
        <div class="flex items-center gap-3">
            <img src="assets/github-logo.png" class="w-10" alt="">
          <h2 class="text-xl font-bold">
          GitHub Issues Tracker
          </h2>
        </div>
        <div class="flex gap-2">
            <input id="search-text"
            type="text"
            placeholder="Search Issue"
            class="input input-bordered">

            <button onclick="searchIssue()"
            class="btn btn-primary">
            Search
            </button>
        </div>
    </div>

    <div class="flex gap-4 mt-6 w-10/12 mx-auto">
    <button onclick="filterIssues('all')" class="btn btn-primary">
      All
    </button>
    <button onclick="filterIssues('open')" class="btn">
      Open
    </button>
    <button onclick="filterIssues('closed')" class="btn">
      Closed
    </button>
    </div>

   
   <!-- ISSUE COUNT -->

    <div class="bg-white w-[90%] mx-auto mt-6 p-6 rounded shadow flex gap">

        <div class="bg-purple-100 p-3 rounded-full">
            <img src="assets/Aperture.png" alt="">
        </div>
        <div class="">
           <h2 id="issue-count" class="text-xl font-bold  ">0 Issues</h2>
           <p class="text-gray-500 text-sm">Track and manage your project issues</p>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loader" class="text-center mt-10 hidden">
       <span class="loading loading-spinner loading-lg "></span>
    </div>

    <!-- ISSUE CONTAINER -->
    <div id="issue-container"
      class="grid grid-cols-1 md:grid-cols-2  lg:grid-cols-4 gap-6 px-24 pt-5">
    </div>

    
    <!-- MODAL -->
    <dialog id="issueModal" class="modal">
    <div class="modal-box">
      <h3 id="modal-title" class="font-bold text-lg"></h3>
      <div class="flex gap-2 mt-3">
    <span class="text-xs border px-2 py-1 rounded text-red-500 border-red-300 flex gap-2"><img src="assets/Vector (8).png" alt="">
      BUG
    </span>
    <span class="text-xs border px-5 py-1 rounded text-yellow-500 border-yellow-300 flex"><img src="assets/Vector (7).png" alt="">
    HELP WANTED
    </span>
  </div>
      <p id="modal-desc" class="py-4"></p>
      <p id="modal-status" class=""></p>
        <p id="modal-author" class=""></p>
        <p id="modal-priority"></p>

    <div class="modal-action">

        <form method="dialog">
          <button class="btn btn-primary">Close</button>
        </form>
     </div>
    </div>
    </dialog>

<script src="script/login.js"></script>
<script src="script/issues.js"></script>

</body>
</html>
